<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef AI — Cooking Recipe Assistant</title>
    <meta name="description" content="AI-powered cooking recipe assistant. Find recipes by ingredients, get step-by-step instructions, and explore cuisines from around the world.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">🍳</div>
                <span class="logo-text">Chef AI</span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 3H3v18h18V3z"/><path d="M9 3v18"/></svg>
            </button>
        </div>

        <button class="new-chat-btn" id="newChatBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New chat
        </button>

        <div class="sidebar-search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search" id="searchInput">
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" id="navExplore">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
                Explore
            </a>
            <a href="#" class="nav-item" id="navRecipes">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                Recipes
            </a>
            <a href="#" class="nav-item" id="navHistory">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                History
            </a>
        </nav>

        <div class="sidebar-history" id="chatHistory">
            <div class="history-label">Today</div>
        </div>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">👨‍🍳</div>
                <div class="user-details">
                    <span class="user-name">Home Chef</span>
                    <span class="user-sub">Free Plan</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="model-badge">
                    <span class="model-icon">🍳</span>
                    <span>Chef AI</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
            </div>
            <div class="top-bar-right">
                <button class="top-btn" id="clearChatBtn" title="Clear chat">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                    Clear chat
                </button>
                <div class="source-badge">
                    <span class="source-dot local"></span>
                    Local + API
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <!-- Welcome Screen (shown initially) -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="orb-container">
                    <div class="orb"></div>
                    <div class="orb-glow"></div>
                </div>
                <h2 class="welcome-greeting">Hello, Chef</h2>
                <h1 class="welcome-title">What shall we cook today?</h1>

                <!-- Suggestion Cards -->
                <div class="suggestion-cards">
                    <button class="suggestion-card" data-message="I have chicken, garlic, and rice. What can I make?">
                        <div class="card-icon">🔍</div>
                        <div class="card-title">Find Recipes</div>
                        <div class="card-desc">Search by ingredients you have at home</div>
                    </button>
                    <button class="suggestion-card" data-message="Show me all available recipes in your collection">
                        <div class="card-icon">📖</div>
                        <div class="card-title">Browse Collection</div>
                        <div class="card-desc">Explore 25 curated recipes from 7 cuisines</div>
                    </button>
                    <button class="suggestion-card" data-message="What vegetarian dinner recipes do you recommend?">
                        <div class="card-icon">🥗</div>
                        <div class="card-title">Dietary Options</div>
                        <div class="card-desc">Find vegan, vegetarian, or gluten-free meals</div>
                    </button>
                </div>
            </div>

            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer"></div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea class="chat-input" id="chatInput" placeholder="Tell me what ingredients you have..." rows="1"></textarea>
                <div class="input-actions">
                    <div class="input-hints">
                        <span class="hint-badge" id="hintLocal">📦 Local KB</span>
                        <span class="hint-badge" id="hintApi">🌐 TheMealDB</span>
                    </div>
                    <button class="send-btn" id="sendBtn" title="Send message">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
            <div class="input-footer">
                Powered by Groq LLM + TheMealDB API • Dual Knowledge Base
            </div>
        </div>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
